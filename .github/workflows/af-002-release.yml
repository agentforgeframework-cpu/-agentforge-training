# af-002-release.yml — v2 (post-field-test fixes)
# Changes vs v1:
#  F-A: In-tree manifest MIRROR at repo root with a per-release filename
#       (RELEASE-MANIFEST-{tag}.json). A never-before-existing path cannot
#       have a stale cache entry anywhere. Fixes universal Probe-04 failure
#       (release-asset redirects blocked on 4/4 verified platforms).
#  F-B: The gate prompt is now GENERATED by this workflow with literal
#       SHA-pinned entry URLs (fixes Defect 2) and written into the release
#       body. Every release ships its own ready-to-paste gate.
#  Receipt gains Rate Limit Status field (Grok polish item, adopted).
name: AF-002 Release Manifest

on:
  push:
    tags:
      - 'af-002-v*'

permissions:
  contents: write

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate manifest and gate
        run: |
          python3 << 'EOF'
          import hashlib, json, os, subprocess, datetime

          course = "af-002-iot-aiot-for-sas-programmers"
          sha = subprocess.check_output(
              ["git", "rev-parse", "HEAD^{commit}"], text=True).strip()
          tag = os.environ["GITHUB_REF_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          base = f"https://raw.githubusercontent.com/{repo}/{sha}"

          routing = {}
          for root, dirs, files in os.walk(course):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fn in sorted(files):
                  p = os.path.join(root, fn)
                  with open(p, "rb") as fh:
                      data = fh.read()
                  key = p[len(course)+1:].replace('/', '_').replace('.', '_').upper()
                  routing[key] = {
                      "path": p,
                      "immutable_url": f"{base}/{p}",
                      "sha256": hashlib.sha256(data).hexdigest(),
                      "size_bytes": len(data),
                  }

          manifest = {
              "kit": "AF-002",
              "release_id": tag,
              "content_commit": sha,
              "generated_at": datetime.datetime.now(datetime.timezone.utc)
                                .strftime("%Y-%m-%dT%H:%M:%SZ"),
              "expected_object_count": len(routing),
              "routing_table": routing,
          }
          mirror_name = f"RELEASE-MANIFEST-{tag}.json"
          with open("RELEASE-MANIFEST.json", "w") as out:      # release asset copy
              json.dump(manifest, out, indent=2)
          with open(mirror_name, "w") as out:                   # in-tree mirror copy
              json.dump(manifest, out, indent=2)

          # ---- Generate the filled gate prompt (release body) ----
          mirror_url = f"https://raw.githubusercontent.com/{repo}/main/{mirror_name}"
          asset_url = f"https://github.com/{repo}/releases/download/{tag}/RELEASE-MANIFEST.json"
          entry = lambda f: routing[f]["immutable_url"]
          gate = f"""AGENTFORGE RETRIEVAL GATE — AF-002, release {tag}
          (Paste this entire block to your AI before beginning the course.)

          Expected Release ID: {tag}
          Release Content Commit: {sha}

          Immutable entry URLs (complete literal strings — Level 2 platforms use
          these directly):
          README:  {entry("README_MD")}
          SETUP:   {entry("SETUP_MD")}
          LIBRARY: {entry("LIBRARY_MD")}

          Manifest — primary (in-tree mirror, per-release filename, no redirect):
          {mirror_url}
          Manifest — secondary (release asset; 302-redirects, blocked on some platforms):
          {asset_url}
          Release tree snapshot (rate-limit immune):
          https://codeload.github.com/{repo}/tar.gz/{sha}

          MANDATORY PROTOCOL
          1. Resolve main: prefer
             git ls-remote https://github.com/{repo}.git refs/heads/main
             fallback https://api.github.com/repos/{repo}/commits/main
          2. On HTTP 403/429: do not retry repeatedly; report rate-limited status
             and use another channel or downgrade per levels below.
          3. Retrieve the manifest from the PRIMARY URL above; use the secondary
             only if the primary fails. Never use a /releases/latest/ alias.
          4. Verify: this Expected Release ID == manifest release_id; manifest
             content_commit == {sha}.
          5. If resolved main differs from {sha}, main has advanced past this
             release — report both and ask the human whether Current Branch
             (Mode A) or Fixed Release (Mode B) governs. Not a failure by itself.
          6. Retrieve all further files only via complete immutable_url strings
             from the verified manifest. Absent from the routing table = retrieval
             failure, not a file to fetch elsewhere.
          7. Never substitute search results, uploads, cached branch copies,
             prior context, model memory, or similarly named files.

          LEVELS
          1: branch resolved + immutable file retrieved -> CURRENT BRANCH VERIFIED
          2: immutable content verified, freshness not -> CONTENT IDENTITY VERIFIED
             — CURRENT BRANCH NOT VERIFIED (requires explicit human acceptance to
             continue a current-file request)
          3: neither -> RETRIEVAL FAILED — EXACT FILE NOT VERIFIED

          REQUIRED RECEIPT (before any course work)
          Requested URL: / Resolved Commit: / Branch Resolution Method: /
          Rate Limit Status: [OK | LIMITED | N/A] / Immutable File URL: /
          Manifest URL Used: / Expected Release ID: / Manifest Release ID: /
          Manifest Content Commit: / Retrieval Channel: / Verification Scope: /
          Result:
          Use UNKNOWN when a value or channel is not directly observable."""
          gate = "\n".join(line[10:] if line.startswith(" "*10) else line
                           for line in gate.splitlines())
          with open("gate-body.md", "w") as out:
              out.write("```text\n" + gate + "\n```\n")
          print(f"{len(routing)} objects; content_commit={sha}; release={tag}")
          EOF

      - name: Commit in-tree mirror to main (idempotent)
        run: |
          TAG="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mv "RELEASE-MANIFEST-${TAG}.json" /tmp/          # park it: avoids untracked-file collision on re-runs
          git fetch origin main
          git checkout -B main FETCH_HEAD                  # tag checkouts have no local main
          mv "/tmp/RELEASE-MANIFEST-${TAG}.json" .
          git add "RELEASE-MANIFEST-${TAG}.json"
          git diff --cached --quiet || git commit -m "Release manifest mirror for ${TAG}"
          git push origin main

      - name: Publish release with manifest asset and gate body
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASE-MANIFEST.json
          tag_name: ${{ github.ref_name }}
          body_path: gate-body.md
